name: 'bountynet build'
description: 'Attested build inside a TEE. Produces a hardware-signed proof that this source became this artifact.'
author: 'maceip'

inputs:
  source:
    description: 'Path to source directory'
    required: false
    default: '.'
  cmd:
    description: 'Build command (auto-detected if not set)'
    required: false
  output:
    description: 'Output directory for attestation + artifact'
    required: false
    default: './bountynet-out'

outputs:
  value_x:
    description: 'Value X — the portable identity hash (sha384)'
  attestation:
    description: 'Path to attestation.json'
  platform:
    description: 'TEE platform (Nitro, SevSnp, Tdx)'
  domain:
    description: 'Attestation domain (<value_x_prefix>.aeon.site)'

runs:
  using: 'composite'
  steps:
    - name: Install bountynet
      shell: bash
      run: |
        if ! command -v bountynet &>/dev/null; then
          echo "Installing bountynet..."
          curl -sSfL https://github.com/maceip/bountynet-genesis/releases/latest/download/bountynet-linux-x86_64 -o /usr/local/bin/bountynet || {
            echo "No prebuilt binary. Building from source..."
            cd ${{ github.action_path }}/..
            cargo build --release --manifest-path v2/Cargo.toml
            cp v2/target/release/bountynet /usr/local/bin/bountynet
          }
          chmod +x /usr/local/bin/bountynet
        fi
        bountynet 2>&1 | head -1

    - name: Attested build
      shell: bash
      id: build
      env:
        BOUNTYNET_SOURCE: ${{ inputs.source }}
        BOUNTYNET_CMD: ${{ inputs.cmd }}
        BOUNTYNET_OUTPUT: ${{ inputs.output }}
      run: |
        set -euo pipefail

        OUTPUT="$BOUNTYNET_OUTPUT"
        mkdir -p "$OUTPUT"

        ARGS=(build "$BOUNTYNET_SOURCE" --output "$OUTPUT")
        if [ -n "$BOUNTYNET_CMD" ]; then
          ARGS+=(--cmd "$BOUNTYNET_CMD")
        fi

        printf 'Running: bountynet'
        printf ' %q' "${ARGS[@]}"
        printf '\n'
        bountynet "${ARGS[@]}"

        # Parse attestation for outputs
        if [ -f "$OUTPUT/attestation.json" ]; then
          VALUE_X=$(python3 -c "import json; print(json.load(open('$OUTPUT/attestation.json'))['value_x'])")
          PLATFORM=$(python3 -c "import json; print(json.load(open('$OUTPUT/attestation.json'))['platform'])")
          PREFIX=$(echo "$VALUE_X" | head -c 12)
          DOMAIN="${PREFIX}.aeon.site"

          echo "value_x=$VALUE_X" >> $GITHUB_OUTPUT
          echo "attestation=$OUTPUT/attestation.json" >> $GITHUB_OUTPUT
          echo "platform=$PLATFORM" >> $GITHUB_OUTPUT
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT

          echo "### Attested Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | \`$PLATFORM\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Value X | \`${VALUE_X:0:24}...\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Domain | \`$DOMAIN\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Attestation | \`$OUTPUT/attestation.json\` |" >> $GITHUB_STEP_SUMMARY
        else
          echo "ERROR: No attestation.json produced"
          exit 1
        fi
