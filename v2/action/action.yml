name: 'uq build'
description: 'Attested build inside a TEE. Produces a hardware-signed receipt that this source became this artifact.'
author: 'maceip'

inputs:
  source:
    description: 'Path to source directory'
    required: false
    default: '.'
  cmd:
    description: 'Build command (auto-detected if not set)'
    required: false
  output:
    description: 'Output directory for attestation + artifact'
    required: false
    default: './uq-out'

outputs:
  value_x:
    description: 'Value X, the portable identity hash (sha384)'
  attestation:
    description: 'Path to attestation.json'
  platform:
    description: 'TEE platform (Nitro, SevSnp, Tdx)'
  domain:
    description: 'Attestation domain (<value_x_prefix>.aeon.site)'

runs:
  using: 'composite'
  steps:
    - name: Install uq
      shell: bash
      run: |
        set -euo pipefail

        if ! command -v uq &>/dev/null; then
          echo "Installing uq..."
          curl -sSfL https://github.com/maceip/unified-quote/releases/latest/download/uq-linux-x86_64 -o /usr/local/bin/uq || {
            echo "No prebuilt binary. Building uq from source..."
            ACTION_ROOT="${{ github.action_path }}/.."
            cargo build --release --manifest-path "$ACTION_ROOT/Cargo.toml" --bin uq
            cp "$ACTION_ROOT/target/release/uq" /usr/local/bin/uq
          }
          chmod +x /usr/local/bin/uq
        fi
        uq 2>&1 | head -1

    - name: Attested build
      shell: bash
      id: build
      env:
        UQ_SOURCE: ${{ inputs.source }}
        UQ_CMD: ${{ inputs.cmd }}
        UQ_OUTPUT: ${{ inputs.output }}
      run: |
        set -euo pipefail

        OUTPUT="$UQ_OUTPUT"
        mkdir -p "$OUTPUT"

        ARGS=(build "$UQ_SOURCE" --output "$OUTPUT")
        if [ -n "$UQ_CMD" ]; then
          ARGS+=(--cmd "$UQ_CMD")
        fi

        printf 'Running: uq'
        printf ' %q' "${ARGS[@]}"
        printf '\n'
        uq "${ARGS[@]}"

        # Parse attestation for outputs
        if [ -f "$OUTPUT/attestation.json" ]; then
          VALUE_X=$(python3 -c "import json; print(json.load(open('$OUTPUT/attestation.json'))['value_x'])")
          PLATFORM=$(python3 -c "import json; print(json.load(open('$OUTPUT/attestation.json'))['platform'])")
          PREFIX=$(echo "$VALUE_X" | head -c 12)
          DOMAIN="${PREFIX}.aeon.site"

          echo "value_x=$VALUE_X" >> $GITHUB_OUTPUT
          echo "attestation=$OUTPUT/attestation.json" >> $GITHUB_OUTPUT
          echo "platform=$PLATFORM" >> $GITHUB_OUTPUT
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT

          echo "### unified-quote attested build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | \`$PLATFORM\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Value X | \`${VALUE_X:0:24}...\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Domain | \`$DOMAIN\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Attestation | \`$OUTPUT/attestation.json\` |" >> $GITHUB_STEP_SUMMARY
        else
          echo "ERROR: No attestation.json produced"
          exit 1
        fi
