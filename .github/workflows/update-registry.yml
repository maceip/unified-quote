name: Update Value X Registry

on:
  workflow_run:
    workflows: ["Attested self-build (the ouroboros)"]
    types: [completed]
    branches: [main]

permissions:
  actions: read
  contents: write

jobs:
  update-registry:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download attested self-build artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          rm -rf attest-out
          mkdir -p attest-out
          gh run download "$RUN_ID" \
            --name "attested-self-build-${HEAD_SHA}" \
            --dir attest-out
          test -s attest-out/attestation.json
          test -s attest-out/attestation.cbor

      - name: Write v2 registry entry
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import datetime
          import hashlib
          import json
          import pathlib
          import os

          att_path = pathlib.Path("attest-out/attestation.json")
          cbor_path = pathlib.Path("attest-out/attestation.cbor")
          att = json.loads(att_path.read_text())
          value_x = att["value_x"]
          platform = att.get("platform", "")
          measurement = att.get("platform_measurement")
          cbor_sha256 = hashlib.sha256(cbor_path.read_bytes()).hexdigest()
          approved_at = datetime.datetime.now(datetime.timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          platform_measurements = {}
          if measurement:
              if platform == "Nitro":
                  platform_measurements["nitro_pcr0"] = measurement
              elif platform == "Tdx":
                  platform_measurements["tdx_mrtd"] = measurement
              elif platform == "SevSnp":
                  platform_measurements["snp_measurement"] = measurement

          entry = {
              "value_x": value_x,
              "source_commit": os.environ["HEAD_SHA"],
              "platform_measurements": platform_measurements,
              "status": "recommended",
              "approved_at": approved_at,
              "notes": (
                  "Auto-registered from attested self-build workflow run "
                  f"{os.environ['RUN_ID']}: {os.environ['RUN_URL']}"
              ),
              "source_hash": att.get("source_hash"),
              "artifact_hash": att.get("artifact_hash"),
              "attestation_cbor_sha256": cbor_sha256,
          }

          out_dir = pathlib.Path("v2/registry")
          out_dir.mkdir(parents=True, exist_ok=True)
          out_path = out_dir / f"{value_x[:16]}.json"
          out_path.write_text(json.dumps(entry, indent=2, sort_keys=True) + "\n")
          print(out_path)
          PY

      - name: Commit registry update
        run: |
          set -euo pipefail
          git config user.name "bountynet-bot"
          git config user.email "bot@bountynet.dev"
          git add v2/registry
          git diff --cached --quiet || git commit -m "registry: update Value X for ${GITHUB_SHA::7} [skip ci]"
          git push
