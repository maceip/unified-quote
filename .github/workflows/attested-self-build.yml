name: Attested self-build (the ouroboros)

# This workflow is the load-bearing one: bountynet builds itself
# inside a TEE and produces a hardware attestation of its own source
# tree. The runner is a GCP TDX instance registered as a self-hosted
# runner for this repo. Any future release of bountynet is provably
# an attested build of a known Value X, signed by the Intel TDX
# module and verifiable end-to-end.
#
# Triggers: any push to main, plus manual dispatch.

on:
  push:
    branches: [main]
    paths:
      - 'v2/**'
      - '.github/workflows/attested-self-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  attested-build:
    runs-on: [self-hosted, tdx, bountynet]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm runner is inside a TEE
        run: |
          echo "Runner identity:"
          uname -a
          echo "TEE device probe:"
          ls -la /dev/tdx_guest /sys/kernel/config/tsm/report 2>&1 || true
          echo "bountynet binary:"
          which bountynet
          bountynet 2>&1 | head -3

      - name: Attested build of v2/
        run: |
          set -e
          rm -rf attest-out
          mkdir -p attest-out
          sudo bountynet build v2 \
            --cmd 'cargo build --release' \
            --output "$GITHUB_WORKSPACE/attest-out"
          echo "--- output ---"
          ls -la attest-out/
          echo "--- attestation.json (summary) ---"
          cat attest-out/attestation.json | python3 -m json.tool 2>/dev/null | head -30 || head -30 attest-out/attestation.json

      - name: Assert attestation bytes look sane
        run: |
          set -e
          # First byte of the CBOR must be a map header (0xa0..0xbb).
          # If the producer regressed, we'd get something else here.
          BYTE=$(sudo xxd -p -l1 attest-out/attestation.cbor)
          echo "first byte: 0x$BYTE"
          case "$BYTE" in
            a*|b*) echo "CBOR map header OK" ;;
            *) echo "NOT a CBOR map header — producer regressed" ; exit 1 ;;
          esac
          SIZE=$(sudo stat -c '%s' attest-out/attestation.cbor)
          echo "attestation.cbor size: $SIZE bytes"
          if [ "$SIZE" -lt 1000 ]; then
            echo "attestation suspiciously small"
            exit 1
          fi

      - name: Upload attestation artifact
        uses: actions/upload-artifact@v4
        with:
          name: attested-self-build-${{ github.sha }}
          path: |
            attest-out/attestation.cbor
            attest-out/attestation.json
          retention-days: 90
          if-no-files-found: error
