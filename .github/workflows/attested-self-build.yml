name: Attested self-build (the ouroboros)

# This workflow is the load-bearing one: unified-quote builds itself
# inside a TEE and produces a hardware attestation of its own source
# tree. The runner is a GCP TDX instance registered as a self-hosted
# runner for this repo. Any future release of unified-quote is provably
# an attested build of a known Value X, signed by the Intel TDX
# module and verifiable end-to-end.
#
# Triggers: any push to main, plus manual dispatch.

on:
  push:
    branches: [main]
    paths:
      - 'v2/**'
      - '.github/workflows/attested-self-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  attested-build:
    runs-on: [self-hosted, tdx, unified-quote]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm runner is inside a TEE
        run: |
          set -euo pipefail
          echo "Runner identity:"
          uname -a
          echo "TEE device probe:"
          ls -la /dev/tdx_guest /sys/kernel/config/tsm/report 2>&1 || true
          BIN="$(command -v uq || command -v unified-quote || true)"
          if [ -z "$BIN" ]; then
            echo "No uq or legacy unified-quote binary on runner"
            exit 1
          fi
          echo "unified-quote binary: $BIN"
          "$BIN" 2>&1 | head -3 || true
          echo "UQ_BIN=$BIN" >> "$GITHUB_ENV"

      - name: Prepare Rust toolchain
        run: |
          set -euo pipefail
          if ! command -v cc >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y build-essential cmake pkg-config
          fi
          if ! command -v cargo >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
          CARGO_BIN="$(command -v cargo || true)"
          if [ -z "$CARGO_BIN" ] && [ -x "$HOME/.cargo/bin/cargo" ]; then
            CARGO_BIN="$HOME/.cargo/bin/cargo"
          fi
          if [ -z "$CARGO_BIN" ]; then
            echo "cargo was not found after toolchain setup"
            exit 1
          fi
          "$CARGO_BIN" --version
          echo "CARGO_BIN=$CARGO_BIN" >> "$GITHUB_ENV"
          echo "RUSTUP_HOME=${RUSTUP_HOME:-$HOME/.rustup}" >> "$GITHUB_ENV"
          echo "CARGO_HOME=${CARGO_HOME:-$HOME/.cargo}" >> "$GITHUB_ENV"

      - name: Attested build of v2/
        run: |
          set -euo pipefail
          rm -rf attest-out
          mkdir -p attest-out
          sudo env "PATH=$PATH" "RUSTUP_HOME=$RUSTUP_HOME" "CARGO_HOME=$CARGO_HOME" "$UQ_BIN" build v2 \
            --cmd "$CARGO_BIN build --release" \
            --output "$GITHUB_WORKSPACE/attest-out"
          echo "--- output ---"
          ls -la attest-out/
          echo "--- attestation.json (summary) ---"
          cat attest-out/attestation.json | python3 -m json.tool 2>/dev/null | head -30 || head -30 attest-out/attestation.json

      - name: Assert attestation bytes look sane
        run: |
          set -e
          # First byte of the CBOR must be a map header (0xa0..0xbb).
          # If the producer regressed, we'd get something else here.
          BYTE=$(sudo xxd -p -l1 attest-out/attestation.cbor)
          echo "first byte: 0x$BYTE"
          case "$BYTE" in
            a*|b*) echo "CBOR map header OK" ;;
            *) echo "NOT a CBOR map header — producer regressed" ; exit 1 ;;
          esac
          SIZE=$(sudo stat -c '%s' attest-out/attestation.cbor)
          echo "attestation.cbor size: $SIZE bytes"
          if [ "$SIZE" -lt 1000 ]; then
            echo "attestation suspiciously small"
            exit 1
          fi

      - name: Upload attestation artifact
        uses: actions/upload-artifact@v4
        with:
          name: attested-self-build-${{ github.sha }}
          path: |
            attest-out/attestation.cbor
            attest-out/attestation.json
          retention-days: 90
          if-no-files-found: error
